<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Vedic Stars ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#f5d77a;--gold2:#e8a84b;--purple:#a89cd0;--text:#e2daf5;--muted:#7a6e96;
  --card:rgba(255,255,255,0.055);--border:rgba(255,255,255,0.11);
  --good:#80e0a0;--warn:#f5d77a;--bad:#f08080;--node:#c0b0f0;
}
body{font-family:'Inter',sans-serif;background:linear-gradient(140deg,#0a0a28 0%,#180838 50%,#091c3a 100%);min-height:100vh;color:var(--text);line-height:1.6;}

/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:block;}
.form-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}

/* ── STARS BACKGROUND ── */
body::before{content:'';position:fixed;inset:0;background-image:
  radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.6) 0%,transparent 100%),
  radial-gradient(1px 1px at 80% 10%,rgba(255,255,255,.5) 0%,transparent 100%),
  radial-gradient(1px 1px at 50% 70%,rgba(255,255,255,.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 10% 85%,rgba(255,255,255,.5) 0%,transparent 100%),
  radial-gradient(1px 1px at 90% 55%,rgba(255,255,255,.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 35% 15%,rgba(255,255,255,.6) 0%,transparent 100%),
  radial-gradient(1px 1px at 65% 90%,rgba(255,255,255,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 5% 50%,rgba(255,255,255,.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 75% 40%,rgba(255,255,255,.5) 0%,transparent 100%),
  radial-gradient(1px 1px at 45% 60%,rgba(255,255,255,.3) 0%,transparent 100%);
  pointer-events:none;z-index:0;}
.form-screen,#reading-screen,#loading-screen{position:relative;z-index:1;}

/* ── FORM ── */
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);text-align:center;color:var(--gold);margin-bottom:.4rem;letter-spacing:.02em;}
.hero-sub{text-align:center;color:var(--purple);font-size:.95rem;margin-bottom:2.5rem;font-style:italic;}
.card{background:var(--card);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:20px;padding:2rem;width:100%;max-width:500px;}
.form-group{margin-bottom:1.2rem;}
label{display:block;color:#c4b8e8;font-size:.8rem;font-weight:600;margin-bottom:.4rem;letter-spacing:.06em;text-transform:uppercase;}
input,select{width:100%;padding:.75rem 1rem;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none;}
input:focus,select:focus{border-color:var(--gold);background:rgba(255,255,255,.1);}
input[type="date"]::-webkit-calendar-picker-indicator,input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(.7) opacity(.6);cursor:pointer;}
select option{background:#180838;color:var(--text);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.time-unknown-row{display:flex;align-items:center;gap:.5rem;margin-top:.5rem;}
.time-unknown-row input[type=checkbox]{width:auto;cursor:pointer;accent-color:var(--gold);}
.time-unknown-row label{text-transform:none;letter-spacing:0;font-size:.85rem;color:var(--muted);margin:0;cursor:pointer;}
.btn{width:100%;padding:1rem;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;color:#1a0a3e;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:1rem;transition:transform .2s,box-shadow .2s;letter-spacing:.03em;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,215,122,.25);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.error-msg{color:#f08080;font-size:.85rem;margin-top:.75rem;text-align:center;min-height:1.2em;}
.form-footer{text-align:center;color:var(--muted);font-size:.78rem;margin-top:1.5rem;max-width:400px;line-height:1.7;}

/* ── LOADING ── */
#loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;}
.spinner{width:56px;height:56px;border:3px solid rgba(245,215,122,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);font-style:italic;}
.loading-sub{color:var(--purple);font-size:.9rem;transition:opacity .3s;}

/* ── READING ── */
#reading-screen{max-width:820px;margin:0 auto;padding:1rem 1rem 5rem;}
.reading-header{text-align:center;padding:3rem 1rem 2rem;}
.reading-name{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);color:var(--gold);margin-bottom:.4rem;}
.reading-birth{color:var(--purple);font-size:.88rem;margin-bottom:.8rem;}
.badge{display:inline-block;background:rgba(245,215,122,.12);border:1px solid rgba(245,215,122,.35);border-radius:20px;padding:.3rem 1rem;color:var(--gold);font-size:.8rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin:.2rem;}
.back-btn{background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:.9rem;cursor:pointer;padding:.5rem 0;display:inline-flex;align-items:center;gap:.4rem;margin-bottom:.5rem;transition:color .2s;}
.back-btn:hover{color:var(--gold);}

/* SECTION */
.section{margin-bottom:2.5rem;}
.section-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(245,215,122,.18);}
.prose{color:#cfc7e6;line-height:1.85;font-size:.93rem;}
.prose p{margin-bottom:.9rem;}

/* CHART */
.chart-wrap{display:flex;justify-content:center;margin:1.5rem 0;}
.kundali{display:grid;grid-template-columns:repeat(4,88px);grid-template-rows:repeat(4,88px);gap:2px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;padding:2px;}
.kc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px;}
.kc.lagna-house{background:rgba(245,215,122,.09);border-color:rgba(245,215,122,.35);}
.kc.center{grid-column:2/4;grid-row:2/4;background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05);font-family:'Playfair Display',serif;font-style:italic;color:var(--muted);font-size:.75rem;text-align:center;padding:.5rem;}
.hnum{position:absolute;top:3px;left:4px;font-size:.58rem;color:var(--muted);}
.hsign{font-size:.62rem;color:#c0b4e0;line-height:1.3;text-align:center;}
.plist{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:3px;}
.pt{font-size:.58rem;padding:1px 3px;border-radius:3px;font-weight:700;}
.pt.b{background:rgba(80,200,120,.22);color:#90e8a8;}
.pt.m{background:rgba(220,80,80,.22);color:#f09090;}
.pt.l{background:rgba(245,215,122,.22);color:var(--gold);}
.pt.n{background:rgba(160,130,240,.22);color:var(--node);}
.lagna-mark{font-size:.55rem;color:var(--gold);font-weight:700;}

/* PLANET TABLE */
.ptable{width:100%;border-collapse:collapse;font-size:.85rem;}
.ptable th{text-align:left;padding:.5rem .75rem;color:var(--purple);font-weight:600;border-bottom:1px solid var(--border);font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;}
.ptable td{padding:.55rem .75rem;color:#cfc7e6;border-bottom:1px solid rgba(255,255,255,.04);}
.ptable tr:last-child td{border-bottom:none;}
.ptable tr:hover td{background:rgba(255,255,255,.03);}
.good{color:var(--good);}
.warn{color:var(--warn);}
.weak{color:var(--bad);}

/* TIMELINE */
.timeline{position:relative;padding-left:0;}
.tl-item{position:relative;padding-left:44px;margin-bottom:1.5rem;}
.tl-item::before{content:'';position:absolute;left:14px;top:0;bottom:-1.5rem;width:2px;background:linear-gradient(to bottom,rgba(245,215,122,.35),rgba(245,215,122,.05));}
.tl-item:last-child::before{display:none;}
.tl-dot{position:absolute;left:7px;top:5px;width:16px;height:16px;border-radius:50%;border:2px solid rgba(245,215,122,.4);background:#180838;}
.tl-item.current .tl-dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 14px rgba(245,215,122,.45);}
.tl-item.past .tl-dot{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.05);}
.tl-label{font-weight:600;color:var(--text);font-size:.93rem;margin-bottom:.15rem;}
.tl-item.current .tl-label{color:var(--gold);}
.tl-item.past .tl-label{color:var(--muted);}
.tl-dates{font-size:.78rem;color:var(--muted);margin-bottom:.35rem;}
.tl-desc{font-size:.87rem;color:#b5aed0;line-height:1.65;}

/* YEAR CARDS */
.year-grid{display:grid;gap:.75rem;}
.year-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;display:grid;grid-template-columns:76px 1fr;gap:.75rem;align-items:start;}
.year-card.now{background:rgba(245,215,122,.07);border-color:rgba(245,215,122,.28);}
.year-card.soon{background:rgba(160,130,240,.05);border-color:rgba(160,130,240,.18);}
.yr-left .yr-num{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--gold);font-weight:700;line-height:1;}
.yr-left .yr-age{font-size:.72rem;color:var(--muted);margin-top:3px;}
.yr-now-tag{font-size:.6rem;font-weight:700;color:#180838;background:var(--gold);border-radius:10px;padding:1px 6px;display:inline-block;margin-top:4px;letter-spacing:.04em;}
.yr-period{font-size:.75rem;color:var(--purple);font-weight:600;margin-bottom:.3rem;}
.yr-desc{font-size:.87rem;color:#c0b8d8;line-height:1.65;}

/* CURRENT FOCUS CARD */
.focus-card{background:linear-gradient(135deg,rgba(245,215,122,.08),rgba(160,130,240,.06));border:1px solid rgba(245,215,122,.25);border-radius:18px;padding:1.5rem;}
.focus-planet{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);margin-bottom:.4rem;}
.focus-dates{font-size:.8rem;color:var(--muted);margin-bottom:.75rem;}
.focus-body{font-size:.9rem;color:#cfc7e6;line-height:1.8;}
.focus-body p{margin-bottom:.8rem;}
.focus-body p:last-child{margin-bottom:0;}

.divider{border:none;border-top:1px solid var(--border);margin:2rem 0;}

@media(max-width:480px){
  .kundali{grid-template-columns:repeat(4,68px);grid-template-rows:repeat(4,68px);}
  .year-card{grid-template-columns:60px 1fr;}
  .yr-left .yr-num{font-size:1.1rem;}
  .card{padding:1.5rem;}
}
@media print{
  body{background:#fff;color:#222;}
  body::before{display:none;}
  .back-btn,.badge{display:none;}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     SCREEN 1: FORM
══════════════════════════════════════════ -->
<div id="form-screen" class="screen active form-screen">
  <h1 class="hero-title">✨ Your Vedic Stars</h1>
  <p class="hero-sub">A personalised reading from the ancient tradition of Jyotish</p>

  <div class="card">
    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="inp-name" placeholder="Enter your name" autocomplete="given-name">
    </div>
    <div class="row2">
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="inp-date">
      </div>
      <div class="form-group">
        <label>Time of Birth</label>
        <input type="time" id="inp-time" value="12:00">
      </div>
    </div>

      <input type="checkbox" id="time-unknown">

    <div class="form-group" style="margin-top:1.2rem;">
      <label>Place of Birth (City, Country)</label>
      <input type="text" id="inp-place" placeholder="e.g. Manila, Philippines">
    </div>
    <div class="form-group">
      <label>Timezone at Birth (UTC offset)</label>
      <select id="inp-tz">

        <option value="-4">UTC−4 (Atlantic / Toronto DST)</option>
        <option value="-3.5">UTC−3:30 (Newfoundland)</option>
        <option value="-3">UTC−3 (Brazil / Buenos Aires)</option>
        <option value="-2">UTC−2 (South Georgia)</option>
        <option value="-1">UTC−1 (Azores)</option>
        <option value="0">UTC±0 (London / Lisbon / Accra)</option>
        <option value="1">UTC+1 (Paris / Berlin / Lagos)</option>
        <option value="2">UTC+2 (Cairo / Johannesburg)</option>
        <option value="3">UTC+3 (Moscow / Nairobi / Riyadh)</option>
        <option value="3.5">UTC+3:30 (Tehran)</option>
        <option value="4">UTC+4 (Dubai / Baku)</option>
        <option value="4.5">UTC+4:30 (Kabul)</option>
        <option value="5">UTC+5 (Karachi / Islamabad)</option>
        <option value="5.5" selected>UTC+5:30 (India / Sri Lanka)</option>
        <option value="5.75">UTC+5:45 (Nepal)</option>
        <option value="6">UTC+6 (Dhaka / Almaty)</option>
        <option value="6.5">UTC+6:30 (Yangon)</option>
        <option value="7">UTC+7 (Bangkok / Jakarta)</option>
        <option value="8">UTC+8 (Manila / Singapore / Beijing)</option>
        <option value="8.75">UTC+8:45 (Eucla)</option>
        <option value="9">UTC+9 (Tokyo / Seoul)</option>
        <option value="9.5">UTC+9:30 (Adelaide / Darwin)</option>
        <option value="10">UTC+10 (Sydney / Brisbane)</option>
        <option value="10.5">UTC+10:30 (Lord Howe)</option>
        <option value="11">UTC+11 (Noumea)</option>
        <option value="12">UTC+12 (Auckland / Fiji)</option>
        <option value="12.75">UTC+12:45 (Chatham Islands)</option>
        <option value="13">UTC+13 (Samoa)</option>
        <option value="14">UTC+14 (Kiribati)</option>
      </select>
    </div>
    <div id="form-error" class="error-msg"></div>
    <button class="btn" onclick="submitForm()">Cast My Chart ✨</button>
  </div>
  <p class="form-footer">Calculations use the Vedic (Lahiri) system. Birth time affects the rising sign and life-chapter start dates — enter as accurately as you can.</p>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 2: LOADING
══════════════════════════════════════════ -->
<div id="loading-screen" class="screen">
  <div class="spinner"></div>
  <div class="loading-title">Reading the stars…</div>
  <div class="loading-sub" id="loading-msg">Locating birthplace…</div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 3: READING
══════════════════════════════════════════ -->
<div id="reading-screen" class="screen">
  <button class="back-btn" onclick="showScreen('form-screen')">← New Reading</button>
  <div id="reading-content"></div>
</div>

<script>
// ╔═══════════════════════════════════════════╗
// ║  DATA                                     ║
// ╚═══════════════════════════════════════════╝
const SIGNS = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo',
               'Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
const SIGN_SHORT = ['Ari','Tau','Gem','Can','Leo','Vir','Lib','Sco','Sag','Cap','Aqu','Pis'];
const NAKSHATRAS = [
  'Ashwini','Bharani','Krittika','Rohini','Mrigashira','Ardra',
  'Punarvasu','Pushya','Ashlesha','Magha','Purva Phalguni','Uttara Phalguni',
  'Hasta','Chitra','Swati','Vishakha','Anuradha','Jyeshtha',
  'Mula','Purva Ashadha','Uttara Ashadha','Shravana','Dhanishtha','Shatabhisha',
  'Purva Bhadrapada','Uttara Bhadrapada','Revati'
];
const NAK_LORDS = ['Ketu','Venus','Sun','Moon','Mars','Rahu','Jupiter','Saturn','Mercury',
                   'Ketu','Venus','Sun','Moon','Mars','Rahu','Jupiter','Saturn','Mercury',
                   'Ketu','Venus','Sun','Moon','Mars','Rahu','Jupiter','Saturn','Mercury'];
const DASHA_ORDER = ['Ketu','Venus','Sun','Moon','Mars','Rahu','Jupiter','Saturn','Mercury'];
const DASHA_YEARS = {Ketu:7,Venus:20,Sun:6,Moon:10,Mars:7,Rahu:18,Jupiter:16,Saturn:19,Mercury:17};

const PLANET_ABBR = {Sun:'Su',Moon:'Mo',Mars:'Ma',Mercury:'Me',Jupiter:'Ju',Venus:'Ve',Saturn:'Sa',Rahu:'Ra',Ketu:'Ke'};
const PLANET_CLASS = {Sun:'l',Moon:'l',Jupiter:'b',Venus:'b',Mercury:'b',Mars:'m',Saturn:'m',Rahu:'n',Ketu:'n'};

// ── Lagna personality descriptions ──
const LAGNA_PERSONA = [
  // Aries
  `You carry an unmistakable spark — a first-mover energy that gets restless when life feels stagnant. You were built for beginnings, not waiting rooms. There is a pioneer's spirit in you that leads from the front, sometimes impulsively, but your honesty and courage win people over quickly. Anger comes fast and fades just as fast. You respect directness and have very little patience for games or pretence.

  Life tends to respond to you when you act rather than when you plan. Your greatest growth comes through taking bold initiative and then learning from what unfolds — not from thinking through every angle before moving. You are most alive when you have something new to pursue, something to start, something to fight for.`,
  // Taurus
  `There is a steadiness about you that others find deeply reassuring — a quality of being truly present, truly solid. Beauty, comfort, and quality matter to you not as vanity but as a genuine appreciation for what makes life worth living. You take your time making decisions, but once committed you hold firm through storms that would shake anyone else.

  Your relationship to the material world is one of your strengths. You understand how to build things that last — relationships, resources, environments. The shadow side is resistance to change, particularly when things that feel safe are disrupted. But when you allow yourself to move, your capacity to create enduring value is extraordinary.`,
  // Gemini
  `Your mind is your greatest asset — quick, curious, and always hungry for the next idea. You can hold multiple perspectives simultaneously and have a gift for communication that makes you compelling in conversation and writing. Boredom is your true enemy; you thrive on variety and wilt in rigid routine.

  Adaptability is your superpower, though it can sometimes make it hard for others — and even for you — to pin down what you truly want. Underneath the versatility is a genuine love of learning that, when channelled, can make you remarkably skilled across an unusual range of fields. You need a life that keeps feeding your curiosity.`,
  // Cancer
  `You feel everything deeply. Your intuition is extraordinary — you sense the emotional weather of a room before a single word is spoken. Home, family, and belonging are your foundations; without them you feel unmoored in a way that others may not fully understand.

  You nurture those you love with an intensity that can sometimes tip into worry or over-protection. Memory and the past hold enormous power over you — both as sources of nourishment and as places you sometimes get stuck. Learning to hold the past gently rather than cling to it is one of your life's central themes.`,
  // Leo
  `There is a natural warmth and magnetism about you that draws people in. You were built to shine — and when you allow yourself to fully inhabit your gifts, you inspire everyone around you. Generosity is one of your defining qualities; you give with a fullness that others rarely match.

  Pride is your double-edged sword. The same quality that gives you dignity and self-respect can, when wounded, create distance. At your best, your creative self-expression leaves a genuine mark. The world needs your particular kind of warmth, and you are at your happiest when you are both seen and genuinely contributing.`,
  // Virgo
  `Your intelligence is precise and practical — you see what others miss, notice the flaw in the plan before it becomes a problem, and bring order to chaos with remarkable efficiency. Service is embedded in your nature; you express love through doing, fixing, and improving.

  The shadow side is a tendency toward self-criticism and anxiety about falling short of your own high standards. When you extend to yourself the same patience and kindness you show others, something opens. You are more powerful than you typically give yourself credit for, and your capacity to do genuinely useful work in the world is one of your greatest gifts.`,
  // Libra
  `You have a natural sense of fairness, beauty, and balance that others find deeply appealing. Relationships are central to your life — you think in terms of "we" and your greatest flourishing happens alongside a true partner or collaborator. Aesthetics matter to you; you have an eye for what is harmonious and beautiful.

  The challenge is a tendency to avoid conflict at all costs, which can leave important things unsaid until they become impossible to ignore. When you learn to voice your needs with the same grace you bring to listening, your relationships transform. Clarity and gentleness together — that is your art.`,
  // Scorpio
  `You carry a depth and intensity that few people fully see. There are layers within you that take years — sometimes decades — to reveal, and you give your trust carefully. You have a gift for seeing through surfaces to what is actually driving a person or situation, and this perception gives you considerable power.

  Your capacity for transformation is extraordinary. You can survive things that would break most people and emerge not just intact but clearer and more focused. What you commit to, you commit to completely. This intensity is your greatest strength and the thing that requires the most conscious stewardship.`,
  // Sagittarius
  `Freedom is not a preference for you — it is a need. Your spirit requires wide horizons: philosophical, geographic, intellectual. You are perpetually searching for meaning in everything and find ordinary life limiting when it doesn't point toward something larger.

  Your honesty is legendary (sometimes uncomfortably so), your enthusiasm contagious, and your faith in life's essential generosity remarkable. The shadow side is a tendency toward overcommitment and occasional carelessness with the details and responsibilities that don't excite you. At your best, you are one of the most genuinely inspiring people in any room.`,
  // Capricorn
  `You were born with an old soul's patience and sense of responsibility. Success means something to you that goes beyond material reward — it is about building something that lasts, creating a legacy, demonstrating through consistent effort what is possible.

  You take your time warming up to people, but those you let in find extraordinary loyalty and depth. Life often gets better as you age — you are one of those rare people who genuinely flourishes over time, as the discipline and groundwork of earlier years start to pay off in every area simultaneously.`,
  // Aquarius
  `You think differently from most people — not just as a personality trait but as a fundamental orientation toward the world. You see systems, patterns, and possibilities that others miss, and you are drawn to ideas that could improve how things work at a larger scale.

// ║  ASTRONOMY                                ║
// ╚═══════════════════════════════════════════╝
const R = Math.PI / 180;

function julianDay(y, m, d, h) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + h / 24 + B - 1524.5;
}

function lahiriAyanamsha(JD) {
  const T = (JD - 2451545.0) / 36525.0;
  // Lahiri at J2000.0 ≈ 23.8531°, precessing at ~50.2388"/year = 1.395511°/century
  return 23.8531 + T * 1.395511;
}

function normalize(deg) { return ((deg % 360) + 360) % 360; }

function sunLongitude(JD) {
  const T = (JD - 2451545.0) / 36525.0;
  const L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
  const M = (357.52911 + 35999.05029 * T - 0.0001537 * T * T) * R;
  const e = 0.016708634 - 0.000042037 * T;
  const C = (1.9146 - 0.004817 * T - 0.000014 * T * T) * Math.sin(M)
           + (0.019993 - 0.000101 * T) * Math.sin(2 * M)
           + 0.00029 * Math.sin(3 * M);
  const omega = (125.04 - 1934.136 * T) * R;
  const apparent = L0 + C - 0.00569 - 0.00478 * Math.sin(omega);
  return normalize(apparent);
}

function moonLongitude(JD) {
  const T = (JD - 2451545.0) / 36525.0;
  const T2 = T*T, T3=T2*T, T4=T3*T;
  const Lp = 218.3164477 + 481267.88123421*T - 0.0015786*T2 + T3/538841 - T4/65194000;
  const D  = 297.8501921 + 445267.1114034*T  - 0.0018819*T2 + T3/545868 - T4/113065000;
  const M  = 357.5291092 + 35999.0502909*T   - 0.0001536*T2 + T3/24490000;
  const Mp = 134.9633964 + 477198.8675055*T  + 0.0087414*T2 + T3/69699   - T4/14712000;
  const F  = 93.2720950  + 483202.0175233*T  - 0.0036539*T2 - T3/3526000 + T4/863310000;
  const e  = 1 - 0.002516*T - 0.0000074*T2;
  // Top 20 longitude terms from Meeus Table 47.A [D,M,M',F,sigma_l]
  const terms = [
    [0,0,1,0,6288774],[2,0,-1,0,1274027],[2,0,0,0,658314],[0,0,2,0,213618],
    [0,1,0,0,-185116],[0,0,0,2,-114332],[2,0,-2,0,58793],[2,-1,-1,0,57066],
    [2,0,1,0,53322],[2,-1,0,0,45758],[0,1,-1,0,-40923],[1,0,0,0,-34720],
    [0,1,1,0,-30383],[2,0,0,-2,15327],[0,0,1,2,-12528],[0,0,1,-2,10980],
    [4,0,-1,0,10675],[0,0,3,0,10034],[4,0,-2,0,8548],[2,1,-1,0,-7888]
  ];
  let sumL = 0;
  for (const [td,tm,tmp,tf,c] of terms) {
    const arg = (td*D + tm*M + tmp*Mp + tf*F) * R;
    let factor = c;
    if (Math.abs(tm) === 1) factor *= e;
    if (Math.abs(tm) === 2) factor *= e*e;
    sumL += factor * Math.sin(arg);
  }
  return normalize(Lp + sumL / 1000000);
}

function planetLongitude(name, T) {
  // Simplified orbital elements (Meeus Table 33.a, J2000.0)
  const E = {
    Mercury:[252.251,149472.675,77.456,0.20563],
    Venus:  [181.979, 58517.816,131.564,0.00677],
    Mars:   [355.433, 19140.299,336.041,0.09341],
    Jupiter:[34.351,   3034.906, 14.331,0.04839],
    Saturn: [50.077,   1222.114, 93.057,0.05415]
  };
  const [L0,dL,omega,e] = E[name];
  const L = L0 + dL*T;
  const M = (L - omega)*R;
  const v = M + 2*e*Math.sin(M) + 1.25*e*e*Math.sin(2*M);
  return normalize(omega + v/R);
}

function rahuLongitude(T) {
  const omega = 125.0445479 - 1934.1362608*T + 0.0020754*T*T;
  return normalize(omega);
}

function obliquity(T) {
  return (23.439291 - 0.013004*T)*R;
}

function ascendant(JD, lat, lon) {
  const T = (JD - 2451545.0) / 36525.0;
  let GMST = 280.46061837 + 360.98564736629*(JD-2451545) + 0.000387933*T*T - T*T*T/38710000;
  GMST = normalize(GMST);
  const LST  = normalize(GMST + lon);
  const RAMC = LST*R;
  const eps  = obliquity(T);
  const latR = lat*R;
  const y = -Math.cos(RAMC);
  const x = Math.sin(RAMC)*Math.cos(eps) + Math.tan(latR)*Math.sin(eps);
  return normalize(Math.atan2(y, x)/R);
}

// ── Planet strength (simplified) ──
const EXALT = {Sun:1,Moon:2,Mars:10,Mercury:6,Jupiter:4,Venus:12,Saturn:7};
const DEBI  = {Sun:7,Moon:8,Mars:4,Mercury:12,Jupiter:10,Venus:6,Saturn:1};
const OWN   = {Sun:[5],Moon:[4],Mars:[1,8],Mercury:[3,6],Jupiter:[9,12],Venus:[2,7],Saturn:[10,11]};

function planetStrength(name, signIdx) {
  const si = signIdx + 1;
  if (EXALT[name] === si) return 'Exalted';
  if (DEBI[name] === si)  return 'Weakened';
  if (OWN[name]  && OWN[name].includes(si)) return 'At home';
  return 'Neutral';
}

function computeDashas(moonLon, birthDate) {
  const NAK_SPAN = 360/27;
  const nakIdx   = Math.floor(moonLon / NAK_SPAN);
  const elapsed  = (moonLon % NAK_SPAN) / NAK_SPAN;
  const nakLord  = NAK_LORDS[nakIdx];
  const balance  = DASHA_YEARS[nakLord] * (1 - elapsed);
  const startIdx = DASHA_ORDER.indexOf(nakLord);
  const dashas   = [];
  let cur = new Date(birthDate);

  const addDasha = (planet, yrs) => {
    const end = new Date(cur.getTime() + yrs*365.25*86400000);
    dashas.push({planet, start:new Date(cur), end, years:yrs});
    cur = end;
  };

  addDasha(nakLord, balance);
  for (let i=1; i<=9; i++) addDasha(DASHA_ORDER[(startIdx+i)%9], DASHA_YEARS[DASHA_ORDER[(startIdx+i)%9]]);
  return dashas;
}

function computeADs(md) {
  const {planet:mdP, start:mdStart, years:mdYrs} = md;
  const idx = DASHA_ORDER.indexOf(mdP);
  const ads = [];
  let cur = new Date(mdStart);
  for (let i=0; i<9; i++) {
    const adP = DASHA_ORDER[(idx+i)%9];
    const yrs = (DASHA_YEARS[adP]/120)*mdYrs;
    const end = new Date(cur.getTime() + yrs*365.25*86400000);
    ads.push({planet:adP, start:new Date(cur), end, years:yrs});
    cur = end;
  }
  return ads;
}

function findActivePeriod(dashas, date) {
  const t = date.getTime();
  for (const md of dashas) {
    if (t >= md.start.getTime() && t < md.end.getTime()) {
      const ads = computeADs(md);
      for (const ad of ads) {
        if (t >= ad.start.getTime() && t < ad.end.getTime()) return {md, ad};
      }
    }
  }
  return null;
}

function computeChart(year, month, day, hour, tzOffset, lat, lon) {
  const utHour = hour - tzOffset;
  const JD = julianDay(year, month, day, utHour);
  const T  = (JD - 2451545.0)/36525.0;
  const ayan = lahiriAyanamsha(JD);

  const tropAsc = ascendant(JD, lat, lon);
  const sidAsc  = normalize(tropAsc - ayan);
  const lagnaSign = Math.floor(sidAsc/30);
  const lagnaD    = sidAsc%30;

  // Planets
  const planets = {};
  const computePlanet = (name, tropLon) => {
    const sid  = normalize(tropLon - ayan);
    const sign = Math.floor(sid/30);
    const deg  = sid%30;
    const nakI = Math.floor(sid/(360/27));
    const pada = Math.floor((sid%(360/27))/((360/27)/4))+1;
    const house= ((sign-lagnaSign+12)%12)+1;
    const strength = planetStrength(name, sign);
    planets[name]={sid,sign,deg,nak:NAKSHATRAS[nakI],nakLord:NAK_LORDS[nakI],pada,house,strength};
  };

  computePlanet('Sun', sunLongitude(JD));
  computePlanet('Moon', moonLongitude(JD));
  computePlanet('Mars', planetLongitude('Mars',T));
  computePlanet('Mercury', planetLongitude('Mercury',T));
  computePlanet('Jupiter', planetLongitude('Jupiter',T));
  computePlanet('Venus', planetLongitude('Venus',T));
  computePlanet('Saturn', planetLongitude('Saturn',T));
  const rahuTrop = rahuLongitude(T);
  computePlanet('Rahu', rahuTrop);
  computePlanet('Ketu', normalize(rahuTrop + 180));

  const nakI = Math.floor(planets.Moon.sid/(360/27));

  return {JD, ayan, lagnaSign, lagnaD, lagnaSignName:SIGNS[lagnaSign], planets,
          moonNakIdx:nakI, moonNak:NAKSHATRAS[nakI], moonNakLord:NAK_LORDS[nakI]};
}

function fmtDate(d) {
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function fmtDateShort(d) {
  return d.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
}

function ageAt(birthDate, d) {
  let age = d.getFullYear() - birthDate.getFullYear();
  const m = d.getMonth() - birthDate.getMonth();
  if (m < 0 || (m===0 && d.getDate() < birthDate.getDate())) age--;
  return age;
}

function buildYearlyData(dashas, birthDate, fromYear, toYear) {
  const rows = [];
  for (let y = fromYear; y <= toYear; y++) {
    const midDate = new Date(y, 6, 1); // July 1 midyear
    const active = findActivePeriod(dashas, midDate);
    if (!active) continue;
    const {md, ad} = active;
    rows.push({year:y, age:ageAt(birthDate, midDate), md, ad});
  }
  return rows;
}

  }

  return `<div class="chart-wrap">
    <div class="kundali">
      ${cells}
      <div class="kc center" style="grid-column:2/4;grid-row:2/4;">North Indian<br>Kundali</div>
    </div>
  </div>
  <p style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:.5rem;">
    ▲ Asc = Rising Sign (Lagna) &nbsp;|&nbsp;
    <span class="pt l" style="font-size:.7rem;padding:1px 5px;">Sun/Moon</span>
    <span class="pt b" style="font-size:.7rem;padding:1px 5px;">Benefic</span>
    <span class="pt m" style="font-size:.7rem;padding:1px 5px;">Malefic</span>
    <span class="pt n" style="font-size:.7rem;padding:1px 5px;">Node</span>
  </p>`;
}

function buildPlanetTable(chart) {
  const {planets, lagnaSignName, lagnaD} = chart;
  const rows = [['Ascendant (Rising)', `${lagnaD.toFixed(1)}° ${lagnaSignName}`, '—', '—', 'Defines your personality & appearance']];

  const pOrder = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Rahu','Ketu'];
  const PLANET_ROLE = {
    Sun:'Identity · Soul · Father',Moon:'Mind · Emotions · Mother',
    Mercury:'Intellect · Communication',Venus:'Love · Beauty · Pleasure',
    Mars:'Energy · Drive · Courage',Jupiter:'Wisdom · Growth · Fortune',
    Saturn:'Discipline · Karma · Delays',Rahu:'Ambition · Transformation',
    Ketu:'Spirituality · Detachment'
  };
  for (const p of pOrder) {
    const d = planets[p];
    const st = d.strength;
    const cls = st==='Exalted'?'good':st==='Weakened'?'weak':'';
    rows.push([p, `${d.deg.toFixed(1)}° ${SIGNS[d.sign]}`, `H${d.house}`, `<span class="${cls}">${st}</span>`, PLANET_ROLE[p]]);
  }

  return `<div style="overflow-x:auto;margin-top:1.5rem;">
  <table class="ptable">
    <thead><tr><th>Planet</th><th>Position</th><th>House</th><th>State</th><th>Governs</th></tr></thead>
    <tbody>
      ${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}
    </tbody>
  </table></div>`;
}

function buildChaptersHTML(dashas, birthDate, today) {
  let html = '<div class="timeline">';
  for (const md of dashas) {
    if (md.end.getFullYear() < birthDate.getFullYear()) continue; // pre-birth
    const isCurrent = today >= md.start && today < md.end;
    const isPast    = md.end <= today;
    const cls = isCurrent?'current':isPast?'past':'';
    const info = MD_DESCRIPTIONS[md.planet];
    const ageS = ageAt(birthDate, md.start);
    const ageE = ageAt(birthDate, md.end);

    html += `<div class="tl-item ${cls}">
      <div class="tl-dot"></div>
      <div class="tl-label">${info.name}${isCurrent?' <span style="font-size:.7rem;color:#180838;background:var(--gold);border-radius:8px;padding:1px 7px;font-family:Inter,sans-serif;">NOW</span>':''}</div>
      <div class="tl-dates">${fmtDate(md.start)} → ${fmtDate(md.end)} &nbsp;·&nbsp; Ages ${ageS}–${ageE}</div>
      <div class="tl-desc">${isPast&&!isCurrent?`<em>${info.keywords}</em>`:info.plain}</div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function buildYearlyHTML(rows, currentYear) {
  let html = '<div class="year-grid">';
  for (const row of rows) {
    const {year, age, md, ad} = row;
    const isNow  = year === currentYear;
    const isSoon = year > currentYear && year <= currentYear + 3;
    const cls    = isNow?'now':isSoon?'soon':'';
    const mdInfo = MD_DESCRIPTIONS[md.planet];
    const adTheme = AD_THEME[ad.planet];

    // Generate a sentence or two for this year
    let desc = '';
    if (year < currentYear) {
      desc = `${mdInfo.name}: ${ad.planet} influence. ${adTheme.split('.')[0]}.`;
    } else {
      desc = adTheme;
    }

    html += `<div class="year-card ${cls}">
      <div class="yr-left">
        <div class="yr-num">${year}</div>
        <div class="yr-age">Age ${age}</div>
        ${isNow?'<div class="yr-now-tag">NOW</div>':''}
      </div>
      <div>
        <div class="yr-period">${mdInfo.name.replace(' Chapter','')} › ${ad.planet} sub-period (${fmtDateShort(ad.start)} – ${fmtDateShort(ad.end)})</div>
        <div class="yr-desc">${desc}</div>
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function buildNowHTML(active, today) {
  const {md, ad} = active;
  const mdInfo = MD_DESCRIPTIONS[md.planet];
  const adTheme = AD_THEME[ad.planet];

  return `<div class="section">
    <h2 class="section-title">✦ Right Now</h2>
    <div class="focus-card">
      <div class="focus-planet">Your current life chapter: ${mdInfo.name}</div>
      <div class="focus-dates">Major period: ${fmtDate(md.start)} → ${fmtDate(md.end)}</div>
      <div class="focus-body">
        <p>${mdInfo.plain}</p>
      </div>
    </div>
    <div class="focus-card" style="margin-top:1rem;background:linear-gradient(135deg,rgba(160,130,240,.08),rgba(245,215,122,.05));">
      <div class="focus-planet">Active sub-period: ${ad.planet}'s influence</div>
      <div class="focus-dates">${fmtDate(ad.start)} → ${fmtDate(ad.end)}</div>
      <div class="focus-body"><p>${adTheme}</p></div>
    </div>
  </div>
  <hr class="divider">`;
}

// ╔═══════════════════════════════════════════╗
// ║  UI LOGIC                                 ║
// ╚═══════════════════════════════════════════╝
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

let loadingMsgs = ['Locating birthplace…','Computing planetary positions…','Casting your chart…','Reading the stars…'];
let loadingIdx  = 0;
let loadingTimer = null;

function startLoading() {
  showScreen('loading-screen');
  loadingIdx = 0;
  document.getElementById('loading-msg').textContent = loadingMsgs[0];
  loadingTimer = setInterval(() => {
    loadingIdx = (loadingIdx + 1) % loadingMsgs.length;
    document.getElementById('loading-msg').textContent = loadingMsgs[loadingIdx];
  }, 1800);
}

function stopLoading() {
  clearInterval(loadingTimer);
}

async function geocode(place) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(place)}&format=json&limit=1`;
  const res = await fetch(url, {headers:{'Accept-Language':'en'}});
  const data = await res.json();
  if (!data || !data.length) throw new Error('Place not found');
  return {lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name};
}

async function submitForm() {
  const errEl = document.getElementById('form-error');
  errEl.textContent = '';

  const name  = document.getElementById('inp-name').value.trim() || 'You';
  const dateV = document.getElementById('inp-date').value;
  const timeV = document.getElementById('inp-time').value;
  const place = document.getElementById('inp-place').value.trim();
  const tz    = parseFloat(document.getElementById('inp-tz').value);
  const timeUnknown = document.getElementById('time-unknown').checked;

  if (!dateV) { errEl.textContent = 'Please enter your date of birth.'; return; }
  if (!place)  { errEl.textContent = 'Please enter your place of birth.'; return; }

  const [year, month, day] = dateV.split('-').map(Number);
  let hour = 12;
  if (!timeUnknown && timeV) {
    const [h, m] = timeV.split(':').map(Number);
    hour = h + m/60;
  }

  document.querySelector('.btn').disabled = true;
  startLoading();

  try {
    const {lat, lon, display} = await geocode(place);

    const chart = computeChart(year, month, day, hour, tz, lat, lon);
    const birthDate = new Date(year, month-1, day);
    const dashas = computeDashas(chart.planets.Moon.sid, birthDate);

    stopLoading();

    const readingHTML = generateReading(name, chart, dashas, birthDate);

    const header = `
      <div class="reading-header">
        <div class="reading-name">✨ ${name}'s Stars</div>
        <div class="reading-birth">Born ${day} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][month-1]} ${year}${timeUnknown?'':', '+timeV} · ${display.split(',').slice(0,2).join(',').trim()}</div>
        <span class="badge">${chart.lagnaSignName} Rising</span>
        <span class="badge">Moon in ${SIGNS[chart.planets.Moon.sign]}</span>
        <span class="badge">${chart.moonNak}</span>
      </div>`;

    document.getElementById('reading-content').innerHTML = header + readingHTML;
    showScreen('reading-screen');
  } catch(e) {
    stopLoading();
    showScreen('form-screen');
    errEl.textContent = 'Could not find that place — try being more specific (e.g. "Manila, Philippines").';
    console.error(e);
  } finally {
    document.querySelector('.btn').disabled = false;
  }
}

// Allow Enter key on form
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('form-screen').classList.contains('active')) submitForm();
});

// Pre-select UTC+8 for Philippines / common Asian timezone
document.getElementById('inp-tz').value = '8';
</script>
